services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      QA_ADMIN_BYPASS: "true"
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@lacasadelpanal.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-qa-demo-password}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 12
